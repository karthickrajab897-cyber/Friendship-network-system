<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Network | Friendship Network</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: #09090b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 520px;
            animation: fadeInUp 0.6s ease-out;
        }

        .auth-card {
            background: rgba(24, 24, 27, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 48px 40px;
        }

        .form-control,
        .form-select {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #3b82f6;
            color: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .form-label {
            color: #a1a1aa;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .auth-toggle {
            cursor: pointer;
            color: #3b82f6;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .auth-toggle:hover {
            color: #60a5fa;
            text-decoration: underline !important;
        }

        .tag-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            min-height: 50px;
            cursor: text;
            transition: all 0.3s ease;
        }

        .tag-input-container:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .tag-input-container input {
            background: none;
            border: none;
            color: #fff;
            outline: none;
            flex: 1;
            min-width: 100px;
            font-size: 0.9rem;
        }

        .tag-input-container input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .tag-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
            animation: tagIn 0.2s ease-out;
        }

        .tag-badge-interest {
            background: rgba(59, 130, 246, 0.15);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .tag-badge-skill {
            background: rgba(139, 92, 246, 0.15);
            color: #c4b5fd;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .tag-badge .remove-tag {
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
            font-size: 0.7rem;
        }

        .tag-badge .remove-tag:hover {
            opacity: 1;
        }

        .alert-auth {
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 0.85rem;
            display: none;
            margin-bottom: 16px;
        }

        .alert-auth.show {
            display: block;
            animation: fadeInUp 0.3s ease-out;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #52525b;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .particle-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .server-status-banner {
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 0.78rem;
            color: #93c5fd;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .text-gradient {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-glow {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.35);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes tagIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="particle-bg" id="particles-js"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- Logo -->
            <div class="text-center mb-4">
                <a href="/" class="text-decoration-none">
                    <div class="text-gradient fs-2 fw-bold mb-2">
                        <i class="fas fa-project-diagram me-2"></i>Friendship Network
                    </div>
                </a>
                <p class="text-muted small" id="auth-subtitle">Welcome back! Sign in to your account</p>
            </div>

            <!-- Alerts -->
            <div class="alert-auth alert-error mb-3" id="auth-error">
                <i class="fas fa-exclamation-circle me-2"></i><span id="error-text"></span>
            </div>
            <div class="alert-auth alert-success mb-3" id="auth-success">
                <i class="fas fa-check-circle me-2"></i><span id="success-text"></span>
            </div>

            <!-- ═══ LOGIN FORM ═══ -->
            <div id="login-section">
                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" name="email" id="login-email" required
                            placeholder="name@example.com" autocomplete="email">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow-lg btn-glow"
                        id="login-btn">
                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                    </button>
                </form>

                <div class="divider">or</div>

                <div class="text-center">
                    <p class="text-muted small mb-0">Don't have an account?
                        <span class="auth-toggle" onclick="toggleAuth('register')">Create Account</span>
                    </p>
                </div>
            </div>

            <!-- ═══ REGISTER FORM ═══ -->
            <div id="register-section" style="display: none;">
                <form id="register-form">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" name="name" required
                                placeholder="Enter your full name">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" name="email" required
                                placeholder="name@example.com">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" required
                                placeholder="Min 6 characters" minlength="6">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Bio</label>
                            <textarea class="form-control" name="bio" rows="2" placeholder="Tell us about yourself..."
                                style="resize: none;"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Location</label>
                            <input type="text" class="form-control" name="location" placeholder="City, Country">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Interests <span class="text-muted fw-normal">(press Enter to
                                    add)</span></label>
                            <div class="tag-input-container" id="interests-container">
                                <input type="text" id="interests-input" placeholder="e.g. Coding, Music, Art">
                            </div>
                            <input type="hidden" name="interests" id="interests-hidden">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Skills <span class="text-muted fw-normal">(press Enter to
                                    add)</span></label>
                            <div class="tag-input-container" id="skills-container">
                                <input type="text" id="skills-input" placeholder="e.g. Python, React, Design">
                            </div>
                            <input type="hidden" name="skills" id="skills-hidden">
                        </div>
                        <div class="col-12 mt-4">
                            <button type="submit"
                                class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow-lg btn-glow"
                                id="register-btn">
                                <i class="fas fa-user-plus me-2"></i>Create Account
                            </button>
                        </div>
                    </div>
                </form>

                <div class="divider">or</div>

                <div class="text-center">
                    <p class="text-muted small mb-0">Already have an account?
                        <span class="auth-toggle" onclick="toggleAuth('login')">Sign In</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 50, "density": { "enable": true, "value_area": 900 } },
                "color": { "value": "#3b82f6" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.3, "random": true },
                "size": { "value": 2, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#3b82f6", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 1, "direction": "none", "random": true }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "grab" }, "resize": true }
            },
            "retina_detect": true
        });

        // ═══ Toggle Login / Register ═══
        function toggleAuth(type) {
            const login = document.getElementById('login-section');
            const register = document.getElementById('register-section');
            const subtitle = document.getElementById('auth-subtitle');
            hideAlerts();

            if (type === 'register') {
                login.style.display = 'none';
                register.style.display = 'block';
                subtitle.innerText = 'Create your account and join the network';
            } else {
                login.style.display = 'block';
                register.style.display = 'none';
                subtitle.innerText = 'Welcome back! Sign in to your account';
            }
        }

        // ═══ Alert helpers ═══
        function showError(msg) {
            document.getElementById('error-text').innerText = msg;
            document.getElementById('auth-error').classList.add('show');
            document.getElementById('auth-success').classList.remove('show');
        }
        function showSuccess(msg) {
            document.getElementById('success-text').innerText = msg;
            document.getElementById('auth-success').classList.add('show');
            document.getElementById('auth-error').classList.remove('show');
        }
        function hideAlerts() {
            document.getElementById('auth-error').classList.remove('show');
            document.getElementById('auth-success').classList.remove('show');
        }

        // ═══ Tag Input System ═══
        function setupTagInput(inputId, containerId, hiddenId, cssClass) {
            const input = document.getElementById(inputId);
            const container = document.getElementById(containerId);
            const hidden = document.getElementById(hiddenId);
            let tags = [];

            container.addEventListener('click', () => input.focus());

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    const val = input.value.trim().replace(/,/g, '');
                    if (val && !tags.includes(val)) {
                        tags.push(val);
                        renderTags();
                        input.value = '';
                    }
                }
                if (e.key === 'Backspace' && input.value === '' && tags.length > 0) {
                    tags.pop();
                    renderTags();
                }
            });

            function renderTags() {
                container.querySelectorAll('.tag-badge').forEach(b => b.remove());
                tags.forEach((tag, idx) => {
                    const badge = document.createElement('span');
                    badge.className = `tag-badge ${cssClass}`;
                    badge.innerHTML = `${tag} <span class="remove-tag" data-idx="${idx}"><i class="fas fa-times"></i></span>`;
                    container.insertBefore(badge, input);
                });
                hidden.value = tags.join(', ');
                container.querySelectorAll('.remove-tag').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        tags.splice(parseInt(btn.dataset.idx), 1);
                        renderTags();
                    });
                });
            }
        }

        setupTagInput('interests-input', 'interests-container', 'interests-hidden', 'tag-badge-interest');
        setupTagInput('skills-input', 'skills-container', 'skills-hidden', 'tag-badge-skill');

        // ═══ Login Form ═══
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            hideAlerts();
            const btn = document.getElementById('login-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing in...';
            btn.disabled = true;

            const formData = new FormData(e.target);
            const email = (formData.get('email') || '').trim().toLowerCase();
            const password = formData.get('password') || '';

            setTimeout(() => {
                const users = JSON.parse(localStorage.getItem('sfn_users') || '[]');
                const user = users.find(u => u.email === email && u.password === password);

                if (user) {
                    localStorage.setItem('sfn_currentUser', JSON.stringify(user));
                    showSuccess(`Welcome back, ${user.name}! Redirecting…`);
                    btn.innerHTML = `<i class="fas fa-check-circle me-2"></i>Welcome, ${user.name}!`;
                    btn.classList.replace('btn-primary', 'btn-success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    showError('Invalid email or password. Please try again.');
                    btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
                    btn.disabled = false;
                }
            }, 500); // simulate network delay
        };

        // ═══ Register Form ═══
        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            hideAlerts();
            const btn = document.getElementById('register-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Creating account...';
            btn.disabled = true;

            const formData = new FormData(e.target);
            const payload = Object.fromEntries(formData);
            payload.email = payload.email.trim().toLowerCase();

            setTimeout(() => {
                const users = JSON.parse(localStorage.getItem('sfn_users') || '[]');

                if (users.find(u => u.email === payload.email)) {
                    showError('An account with this email already exists.');
                    btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
                    btn.disabled = false;
                    return;
                }

                // Generate ID and assign color
                payload.id = Date.now();
                const colors = ['#3b82f6', '#ec4899', '#f59e0b', '#ef4444', '#6366f1', '#10b981', '#8b5cf6', '#06b6d4', '#f97316', '#14b8a6'];
                payload.avatarColor = colors[Math.floor(Math.random() * colors.length)];

                users.push(payload);
                localStorage.setItem('sfn_users', JSON.stringify(users));
                localStorage.setItem('sfn_currentUser', JSON.stringify(payload));

                showSuccess(`Account created! Welcome, ${payload.name}!`);
                btn.innerHTML = `<i class="fas fa-check-circle me-2"></i>Account Created!`;
                btn.classList.replace('btn-primary', 'btn-success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
            }, 800); // simulate network delay
        };

        // Check URL hash to auto-show register tab
        if (window.location.hash === '#register') toggleAuth('register');
    </script>
</body>

</html>
